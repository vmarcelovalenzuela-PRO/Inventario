<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de la Tienda</title>
    <script defer src="app.js?v=35"></script>
    <style>
        :root {
            --fondo: #fde7fb;
            --panel: #ffffff;
            --texto: #111111;
            --suave: #665466;
            --linea: #efc7ec;
            --azul: #d86bd0;
            --azul-oscuro: #111111;
            --azul-suave: #fff0fd;
            --verde: #059669;
            --verde-fondo: #ecfdf5;
            --ambar: #f59e0b;
            --rojo: #dc2626;
            --rojo-fondo: #fef2f2;
            --gris-boton: #f7d8f4;
            --rosa: #f5b7ef;
            --rosa-fuerte: #e879d8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 8px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--fondo);
            color: var(--texto);
        }

        .contenedor {
            width: min(1100px, 100%);
            margin: 0 auto;
            background: var(--panel);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(17, 17, 17, 0.10);
            overflow: hidden;
            border: 1px solid rgba(17, 17, 17, 0.08);
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--linea);
            background: #f5b7ef;
        }

        .logo-marca {
            width: 76px;
            height: 76px;
            object-fit: contain;
            border-radius: 12px;
        }

        h1 {
            margin: 0;
            text-align: left;
            font-size: 26px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        main {
            padding: 12px;
        }

        .zona-escaneo {
            display: grid;
            grid-template-columns: 1fr 140px 120px;
            gap: 12px;
            margin-bottom: 12px;
        }

        .campo-escaneo {
            display: grid;
            gap: 8px;
        }

        .scan-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--suave);
            text-transform: uppercase;
        }

        #scan-input,
        #cantidad-input {
            width: 100%;
            padding: 14px 12px;
            border: 2px solid var(--azul);
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--texto);
            outline: none;
            background: linear-gradient(180deg, #ffffff 0%, #fff7fe 100%);
        }

        #cantidad-input {
            text-align: center;
        }

        #scan-input:focus {
            border-color: var(--rosa-fuerte);
            box-shadow: 0 0 0 4px rgba(245, 183, 239, 0.42);
        }

        #cantidad-input:focus {
            border-color: var(--rosa-fuerte);
            box-shadow: 0 0 0 4px rgba(245, 183, 239, 0.42);
        }

        .estado-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        .estado {
            min-height: 64px;
            padding: 10px;
            border: 1px solid var(--linea);
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #fff6fe 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .estado .etiqueta {
            display: block;
            margin-bottom: 6px;
            color: var(--suave);
            font-size: 12px;
            font-weight: 700;
        }

        .estado .valor {
            display: block;
            font-size: 17px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .valor.ok {
            color: var(--verde);
        }

        .valor.error {
            color: var(--rojo);
        }

        .acciones {
            display: grid;
            gap: 10px;
        }

        .acciones-principales {
            grid-template-columns: repeat(4, 1fr);
            margin-bottom: 12px;
        }

        button {
            min-height: 38px;
            padding: 9px 10px;
            border: 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            color: var(--texto);
            background: var(--gris-boton);
            box-shadow: inset 0 -1px 0 rgba(15, 23, 42, 0.08);
        }

        button.primario {
            color: white;
            background: var(--azul);
        }

        button.primario:hover {
            background: var(--azul-oscuro);
        }

        button.verde {
            color: white;
            background: var(--verde);
        }

        button.peligro {
            color: white;
            background: var(--rojo);
        }

        button.secundario {
            color: #111111;
            background: var(--azul-suave);
            border: 1px solid #e9a8e4;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .btn-borrar-fila {
            min-height: 34px;
            padding: 8px 10px;
            border-radius: 6px;
            color: white;
            background: var(--rojo);
            font-size: 13px;
        }

        .celda-talla {
            min-width: 74px;
        }

        .control-talla {
            display: inline-grid;
            grid-template-columns: 26px minmax(24px, auto) 26px;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }

        .btn-restar,
        .btn-sumar {
            min-height: 26px;
            width: 26px;
            padding: 0;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            line-height: 1;
        }

        .btn-restar {
            background: #64748b;
        }

        .btn-sumar {
            background: var(--verde);
        }

        .cantidad-talla {
            font-weight: 800;
        }

        .tabla-contenedor {
            overflow-x: auto;
            border: 1px solid var(--linea);
            border-radius: 10px;
            background: white;
        }

        table {
            width: 100%;
            min-width: 820px;
            border-collapse: collapse;
            text-align: center;
            background: white;
        }

        th {
            padding: 9px 8px;
            border-bottom: 2px solid var(--linea);
            background: #f8fafc;
            color: #475467;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 9px 8px;
            border-bottom: 1px solid #eef2f7;
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .col-articulo {
            text-align: left;
            font-weight: 800;
            color: #111827;
        }

        .col-total {
            font-weight: 900;
            background: var(--verde-fondo);
            color: #047857;
        }

        .fila-vacia {
            padding: 24px;
            color: #98a2b3;
            text-align: center;
        }

        .historial {
            margin-top: 12px;
            border: 1px solid var(--linea);
            border-radius: 10px;
            background: #f8fafc;
            overflow: hidden;
        }

        .historial h2 {
            margin: 0;
            padding: 12px;
            border-bottom: 1px solid var(--linea);
            font-size: 15px;
        }

        #lista-historial {
            display: grid;
            max-height: 220px;
            overflow: auto;
        }

        .historial-item {
            padding: 10px 12px;
            border-bottom: 1px solid #e8eef6;
            font-size: 13px;
        }

        .historial-item:last-child {
            border-bottom: none;
        }

        .historial-item strong {
            display: block;
            font-size: 14px;
        }

        .historial-item span {
            color: var(--suave);
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.46);
        }

        .modal.modal-oculto {
            display: none;
        }

        .modal-caja {
            width: min(420px, 100%);
            padding: 18px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.25);
        }

        .modal-caja h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .modal-caja p {
            margin: 0 0 16px;
            color: var(--suave);
            line-height: 1.45;
        }

        .modal-acciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 760px) {
            body {
                padding: 10px;
            }

            main {
                padding: 14px;
            }

            header {
                justify-content: flex-start;
            }

            .logo-marca {
                width: 60px;
                height: 60px;
            }

            h1 {
                font-size: 23px;
            }

            #scan-input {
                font-size: 20px;
            }

            .zona-escaneo {
                grid-template-columns: 1fr;
            }

            .estado-grid,
            .acciones-principales {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <header>
            <img class="logo-marca" src="cmoran.png" alt="C/MORAN">
            <h1>Control de Bodega</h1>
        </header>

        <main>
            <form id="scan-form" class="zona-escaneo">
                <div class="campo-escaneo">
                    <label class="scan-label" for="scan-input">Escanea aqui</label>
                    <input id="scan-input" type="text" inputmode="text" enterkeyhint="next" autocomplete="off" autocapitalize="characters" placeholder="Escanea el codigo de barras">
                </div>
                <div class="campo-escaneo">
                    <label class="scan-label" for="cantidad-input">Cantidad</label>
                    <input id="cantidad-input" type="number" inputmode="numeric" enterkeyhint="done" min="1" max="999" value="1">
                </div>
                <div class="campo-escaneo">
                    <span class="scan-label">&nbsp;</span>
                    <button id="btn-agregar" class="primario" type="submit">Agregar</button>
                </div>
            </form>

            <section class="estado-grid">
                <div class="estado">
                    <span class="etiqueta">Estado</span>
                    <span id="estado-app" class="valor ok">Listo para escanear</span>
                </div>
                <div class="estado">
                    <span class="etiqueta">Ultimo codigo</span>
                    <span id="ultimo-codigo" class="valor">Ninguno</span>
                </div>
                <div class="estado">
                    <span class="etiqueta">Pares contados</span>
                    <span id="contador-total" class="valor">0</span>
                </div>
            </section>

            <section class="acciones acciones-principales">
                <button id="btn-enfocar" class="secundario" type="button">Enfocar escaneo</button>
                <button id="btn-exportar" class="verde" type="button">Descargar Excel</button>
                <button id="btn-compartir" class="secundario" type="button">Compartir Excel</button>
                <button id="btn-limpiar" class="peligro" type="button">Limpiar todo</button>
            </section>

            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>Articulo</th>
                            <th>35</th>
                            <th>36</th>
                            <th>37</th>
                            <th>38</th>
                            <th>39</th>
                            <th>40</th>
                            <th>41</th>
                            <th>Total</th>
                            <th>Borrar</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        <tr>
                            <td colspan="10" class="fila-vacia">Ningun articulo escaneado aun</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <aside class="historial">
                <h2>Ultimas lecturas</h2>
                <div id="lista-historial">
                    <div class="historial-item">
                        <span>Sin lecturas todavia</span>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <div id="modal-confirmacion" class="modal modal-oculto" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <div class="modal-caja">
            <h2 id="modal-titulo">Confirmar accion</h2>
            <p id="modal-mensaje"></p>
            <div class="modal-acciones">
                <button id="btn-cancelar-modal" class="secundario" type="button">Cancelar</button>
                <button id="btn-confirmar-modal" class="peligro" type="button">Borrar</button>
            </div>
        </div>
    </div>
</body>
</html>
